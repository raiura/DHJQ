<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>大荒九丘 - 登录</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', 'SimSun', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            overflow: hidden;
        }

        /* 背景动画 */
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .bg-animation::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: 
                radial-gradient(circle at 20% 80%, rgba(255, 107, 107, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(78, 205, 196, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 40% 40%, rgba(69, 183, 209, 0.05) 0%, transparent 40%);
            animation: bgFloat 20s ease-in-out infinite;
        }

        @keyframes bgFloat {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            33% { transform: translate(30px, -30px) rotate(120deg); }
            66% { transform: translate(-20px, 20px) rotate(240deg); }
        }

        /* 登录容器 */
        .login-container {
            position: relative;
            z-index: 1;
            width: 90%;
            max-width: 420px;
            padding: 40px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 
                0 25px 50px rgba(0, 0, 0, 0.3),
                inset 0 1px 0 rgba(255, 255, 255, 0.1);
        }

        /* 标题区域 */
        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .game-title {
            font-size: 42px;
            font-weight: bold;
            background: linear-gradient(135deg, #ff6b6b, #feca57, #48dbfb, #ff9ff3);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: gradientShift 5s ease infinite;
            margin-bottom: 10px;
            letter-spacing: 4px;
        }

        @keyframes gradientShift {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        .subtitle {
            color: rgba(255, 255, 255, 0.6);
            font-size: 14px;
            letter-spacing: 2px;
        }

        /* 标签切换 */
        .tab-switcher {
            display: flex;
            margin-bottom: 30px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 10px;
            padding: 4px;
        }

        .tab-btn {
            flex: 1;
            padding: 12px;
            border: none;
            background: transparent;
            color: rgba(255, 255, 255, 0.6);
            font-size: 14px;
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.3s ease;
        }

        .tab-btn.active {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
        }

        .tab-btn:hover:not(.active) {
            color: rgba(255, 255, 255, 0.9);
        }

        /* 表单样式 */
        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            color: rgba(255, 255, 255, 0.8);
            font-size: 13px;
            margin-bottom: 8px;
            letter-spacing: 1px;
        }

        .form-input {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            background: rgba(0, 0, 0, 0.2);
            color: #fff;
            font-size: 15px;
            transition: all 0.3s ease;
        }

        .form-input::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }

        .form-input:focus {
            outline: none;
            border-color: rgba(78, 205, 196, 0.5);
            background: rgba(0, 0, 0, 0.3);
            box-shadow: 0 0 0 3px rgba(78, 205, 196, 0.1);
        }

        /* 提交按钮 */
        .submit-btn {
            width: 100%;
            padding: 16px;
            margin-top: 10px;
            border: none;
            border-radius: 10px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .submit-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(
                90deg,
                transparent,
                rgba(255, 255, 255, 0.2),
                transparent
            );
            transition: left 0.5s ease;
        }

        .submit-btn:hover::before {
            left: 100%;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }

        .submit-btn:active {
            transform: translateY(0);
        }

        .submit-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        /* 消息提示 */
        .message {
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }

        .message.error {
            display: block;
            background: rgba(255, 107, 107, 0.1);
            border: 1px solid rgba(255, 107, 107, 0.3);
            color: #ff6b6b;
        }

        .message.success {
            display: block;
            background: rgba(78, 205, 196, 0.1);
            border: 1px solid rgba(78, 205, 196, 0.3);
            color: #4ecdc4;
        }

        .message.loading {
            display: block;
            background: rgba(255, 206, 84, 0.1);
            border: 1px solid rgba(255, 206, 84, 0.3);
            color: #feca57;
        }

        /* 底部链接 */
        .footer {
            text-align: center;
            margin-top: 30px;
            color: rgba(255, 255, 255, 0.4);
            font-size: 12px;
        }

        /* 加载动画 */
        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* 装饰元素 */
        .decoration {
            position: absolute;
            width: 100px;
            height: 100px;
            border-radius: 50%;
            filter: blur(60px);
            opacity: 0.3;
        }

        .decoration-1 {
            top: -50px;
            right: -50px;
            background: #ff6b6b;
        }

        .decoration-2 {
            bottom: -50px;
            left: -50px;
            background: #4ecdc4;
        }

        /* 响应式 */
        @media (max-width: 480px) {
            .login-container {
                padding: 30px 20px;
            }
            
            .game-title {
                font-size: 32px;
            }
        }

        /* 隐藏的元素 */
        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>
    <div class="bg-animation"></div>
    
    <div class="login-container">
        <div class="decoration decoration-1"></div>
        <div class="decoration decoration-2"></div>
        
        <div class="header">
            <h1 class="game-title">大荒九丘</h1>
            <p class="subtitle">坏空之纪 · 修仙世界</p>
        </div>

        <div class="tab-switcher">
            <button class="tab-btn active" data-tab="login">登录</button>
            <button class="tab-btn" data-tab="register">注册</button>
        </div>

        <div id="message" class="message"></div>

        <!-- 登录表单 -->
        <form id="loginForm">
            <div class="form-group">
                <label class="form-label">用户名</label>
                <input 
                    type="text" 
                    class="form-input" 
                    id="loginUsername" 
                    placeholder="请输入用户名"
                    required
                    minlength="3"
                    maxlength="20"
                >
            </div>
            <div class="form-group">
                <label class="form-label">密码</label>
                <input 
                    type="password" 
                    class="form-input" 
                    id="loginPassword" 
                    placeholder="请输入密码"
                    required
                    minlength="6"
                >
            </div>
            <button type="submit" class="submit-btn" id="loginBtn">
                进入游戏
            </button>
        </form>

        <!-- 注册表单 -->
        <form id="registerForm" class="hidden">
            <div class="form-group">
                <label class="form-label">用户名</label>
                <input 
                    type="text" 
                    class="form-input" 
                    id="regUsername" 
                    placeholder="3-20个字符"
                    required
                    minlength="3"
                    maxlength="20"
                >
            </div>
            <div class="form-group">
                <label class="form-label">昵称（可选）</label>
                <input 
                    type="text" 
                    class="form-input" 
                    id="regNickname" 
                    placeholder="显示的名称"
                    maxlength="50"
                >
            </div>
            <div class="form-group">
                <label class="form-label">密码</label>
                <input 
                    type="password" 
                    class="form-input" 
                    id="regPassword" 
                    placeholder="至少6个字符"
                    required
                    minlength="6"
                >
            </div>
            <div class="form-group">
                <label class="form-label">确认密码</label>
                <input 
                    type="password" 
                    class="form-input" 
                    id="regPasswordConfirm" 
                    placeholder="再次输入密码"
                    required
                    minlength="6"
                >
            </div>
            <button type="submit" class="submit-btn" id="registerBtn">
                创建账号
            </button>
        </form>

        <div class="footer">
            <p>© 2024 大荒九丘 · 探索修仙世界的无限可能</p>
        </div>
    </div>

    <script>
        // API 基础地址
        const API_BASE = 'http://localhost:3000/api';

        // DOM 元素
        const tabBtns = document.querySelectorAll('.tab-btn');
        const loginForm = document.getElementById('loginForm');
        const registerForm = document.getElementById('registerForm');
        const messageEl = document.getElementById('message');

        // 标签切换
        tabBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                const tab = btn.dataset.tab;
                
                // 更新按钮状态
                tabBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                
                // 切换表单
                if (tab === 'login') {
                    loginForm.classList.remove('hidden');
                    registerForm.classList.add('hidden');
                } else {
                    loginForm.classList.add('hidden');
                    registerForm.classList.remove('hidden');
                }
                
                // 清除消息
                hideMessage();
            });
        });

        // 显示消息
        function showMessage(text, type = 'error') {
            messageEl.textContent = text;
            messageEl.className = `message ${type}`;
        }

        // 隐藏消息
        function hideMessage() {
            messageEl.className = 'message';
        }

        // 设置按钮加载状态
        function setButtonLoading(btn, loading) {
            if (loading) {
                btn.disabled = true;
                btn.innerHTML = '<span class="spinner"></span>处理中...';
            } else {
                btn.disabled = false;
                btn.innerHTML = btn.id === 'loginBtn' ? '进入游戏' : '创建账号';
            }
        }

        // 保存登录状态
        function saveAuth(token, user) {
            localStorage.setItem('galgame_token', token);
            localStorage.setItem('galgame_user', JSON.stringify(user));
        }

        // 检查是否已登录
        function checkAuth() {
            const token = localStorage.getItem('galgame_token');
            if (token) {
                // 验证 token 是否有效
                fetch(`${API_BASE}/auth/me`, {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                })
                .then(res => res.json())
                .then(data => {
                    if (data.success) {
                        // 已登录，检查是否有重定向参数
                        const urlParams = new URLSearchParams(window.location.search);
                        const redirect = urlParams.get('redirect');
                        window.location.href = redirect || 'galgame_framework.html';
                    } else {
                        // token 无效，清除
                        localStorage.removeItem('galgame_token');
                        localStorage.removeItem('galgame_user');
                    }
                })
                .catch(() => {
                    // 请求失败，保持当前页面
                });
            }
        }

        // 登录表单提交
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            hideMessage();
            
            const username = document.getElementById('loginUsername').value.trim();
            const password = document.getElementById('loginPassword').value;
            const btn = document.getElementById('loginBtn');
            
            setButtonLoading(btn, true);
            
            try {
                const response = await fetch(`${API_BASE}/auth/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ username, password })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    showMessage('登录成功，正在进入游戏...', 'success');
                    saveAuth(data.data.token, data.data.user);
                    
                    // 检查是否有重定向参数
                    const urlParams = new URLSearchParams(window.location.search);
                    const redirect = urlParams.get('redirect');
                    
                    // 延迟跳转，让用户看到成功消息
                    setTimeout(() => {
                        window.location.href = redirect || 'index.html';
                    }, 1000);
                } else {
                    showMessage(data.message || '登录失败');
                    setButtonLoading(btn, false);
                }
            } catch (error) {
                showMessage('网络错误，请检查服务器是否运行');
                setButtonLoading(btn, false);
            }
        });

        // 注册表单提交
        registerForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            hideMessage();
            
            const username = document.getElementById('regUsername').value.trim();
            const nickname = document.getElementById('regNickname').value.trim();
            const password = document.getElementById('regPassword').value;
            const passwordConfirm = document.getElementById('regPasswordConfirm').value;
            const btn = document.getElementById('registerBtn');
            
            // 验证
            if (password !== passwordConfirm) {
                showMessage('两次输入的密码不一致');
                return;
            }
            
            setButtonLoading(btn, true);
            
            try {
                const response = await fetch(`${API_BASE}/auth/register`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ 
                        username, 
                        password,
                        nickname: nickname || username
                    })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    showMessage('注册成功，正在进入游戏...', 'success');
                    saveAuth(data.data.token, data.data.user);
                    
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 1000);
                } else {
                    showMessage(data.message || '注册失败');
                    setButtonLoading(btn, false);
                }
            } catch (error) {
                showMessage('网络错误，请检查服务器是否运行');
                setButtonLoading(btn, false);
            }
        });

        // 页面加载时检查登录状态
        checkAuth();
    </script>
</body>
</html>
