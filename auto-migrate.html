        function executeMigrate() {
            const logEl = document.getElementById('log');
            logEl.innerHTML = '';

            try {
                log('🔄 开始迁移...', 'info');

                // 1. 保存世界书
                const wbKey = 'wb_global_' + gameId;
                const existingWb = localStorage.getItem(wbKey);
                
                if (existingWb) {
                    log('⚠️ 发现已有世界书数据，将合并...', 'info');
                    const existing = JSON.parse(existingWb);
                    worldbookData.entries = [...existing.entries, ...worldbookData.entries];
                }

                localStorage.setItem(wbKey, JSON.stringify(worldbookData));
                log('✅ 世界书数据已保存: ' + wbKey, 'success');
                log('   条目数: ' + worldbookData.entries.length, 'info');

                // 2. 保存角色
                const charKey = 'game_' + gameId + '_characters';
                const existingChars = localStorage.getItem(charKey);
                
                if (existingChars) {
                    log('⚠️ 发现已有角色数据，将合并...', 'info');
                    const existing = JSON.parse(existingChars);
                    const existingNames = new Set(existing.map(c => c.name));
                    const newChars = characters.filter(c => !existingNames.has(c.name));
                    const merged = [...existing, ...newChars];
                    localStorage.setItem(charKey, JSON.stringify(merged));
                    log('✅ 角色数据已更新: ' + charKey, 'success');
                    log('   新增角色: ' + newChars.length, 'info');
                    log('   总角色数: ' + merged.length, 'info');
                } else {
                    localStorage.setItem(charKey, JSON.stringify(characters));
                    log('✅ 角色数据已保存: ' + charKey, 'success');
                    log('   角色数: ' + characters.length, 'info');
                }

                log('<br>🎉 迁移完成！', 'success');
                log('请前往设置页查看结果', 'info');

                // 显示详细信息
                log('<br>--- 世界书条目 ---', 'info');
                worldbookData.entries.forEach(e => {
                    log('• ' + e.name + ' [' + e.group + ']', 'info');
                });

                log('<br>--- 角色 ---', 'info');
                characters.forEach(c => {
                    log('• ' + c.name, 'info');
                });

            } catch (e) {
                log('❌ 错误: ' + e.message, 'error');
                console.error(e);
            }
        }
