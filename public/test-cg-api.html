<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CG系统API测试</title>
    <style>
        body {
            font-family: 'Microsoft YaHei', sans-serif;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            background: #1a1a2e;
            color: #fff;
        }
        .test-section {
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .result {
            background: rgba(0,0,0,0.3);
            border-radius: 8px;
            padding: 12px;
            margin-top: 12px;
            font-family: monospace;
            font-size: 13px;
            white-space: pre-wrap;
            max-height: 300px;
            overflow-y: auto;
        }
        button {
            background: #4f46e5;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            margin-right: 10px;
            margin-bottom: 10px;
        }
        button:hover {
            background: #4338ca;
        }
        input, textarea, select {
            width: 100%;
            padding: 8px;
            margin: 8px 0;
            border-radius: 4px;
            border: 1px solid #444;
            background: rgba(0,0,0,0.3);
            color: #fff;
            box-sizing: border-box;
        }
        .success { color: #4ade80; }
        .error { color: #f87171; }
        .info { color: #60a5fa; }
    </style>
</head>
<body>
    <h1>🖼️ CG系统V2.0 API测试</h1>
    
    <div class="test-section">
        <h2>1️⃣ 基础设置</h2>
        <label>API地址:</label>
        <input type="text" id="apiBase" value="http://localhost:3000/api">
        
        <label>游戏ID:</label>
        <input type="text" id="gameId" value="test_game_123">
        
        <label>Token (可选):</label>
        <input type="text" id="token" placeholder="留空则使用本地存储的token">
    </div>

    <div class="test-section">
        <h2>2️⃣ 添加测试CG</h2>
        <label>CG名称:</label>
        <input type="text" id="cgName" value="雪地战斗-拔剑">
        
        <label>图片URL:</label>
        <input type="text" id="cgUrl" value="https://example.com/snow_battle.jpg">
        
        <label>场景关键词:</label>
        <input type="text" id="sceneKeywords" value="雪地, 战斗, 剑">
        
        <label>情绪标签:</label>
        <input type="text" id="emotions" value="愤怒, 专注">
        
        <label>动作标签:</label>
        <input type="text" id="actions" value="拔剑, 攻击">
        
        <button onclick="testAddCG()">添加CG</button>
        <div id="addResult" class="result" style="display:none"></div>
    </div>

    <div class="test-section">
        <h2>3️⃣ 获取CG列表</h2>
        <button onclick="testGetList()">获取列表</button>
        <div id="listResult" class="result" style="display:none"></div>
    </div>

    <div class="test-section">
        <h2>4️⃣ 智能匹配测试（核心）</h2>
        <label>测试场景描述:</label>
        <textarea id="testScene" rows="3">雪地里，她拔出长剑，眼神中充满愤怒</textarea>
        
        <button onclick="testMatch()">测试匹配</button>
        <button onclick="testBatchMatch()">批量测试</button>
        
        <div id="matchResult" class="result" style="display:none"></div>
    </div>

    <div class="test-section">
        <h2>5️⃣ 测试匹配接口（Settings用）</h2>
        <label>多场景测试（每行一个）:</label>
        <textarea id="batchScenes" rows="4">雪地里，她拔出长剑，眼神中充满愤怒
两人在温泉中放松，气氛暧昧
星空下，他们相拥而吻
战斗进入白热化，她身受重伤</textarea>
        
        <button onclick="testTestMatch()">运行测试</button>
        <div id="testMatchResult" class="result" style="display:none"></div>
    </div>

    <script>
        const API_BASE = () => document.getElementById('apiBase').value;
        const GAME_ID = () => document.getElementById('gameId').value;
        
        function getHeaders() {
            const token = document.getElementById('token').value || localStorage.getItem('galgame_token');
            return {
                'Content-Type': 'application/json',
                ...(token ? { 'Authorization': `Bearer ${token}` } : {})
            };
        }

        function showResult(elementId, data, isError = false) {
            const el = document.getElementById(elementId);
            el.style.display = 'block';
            el.className = 'result ' + (isError ? 'error' : '');
            el.textContent = typeof data === 'object' ? JSON.stringify(data, null, 2) : data;
        }

        async function testAddCG() {
            const data = {
                gameId: GAME_ID(),
                name: document.getElementById('cgName').value,
                url: document.getElementById('cgUrl').value,
                type: 'character_extended',
                triggerSystem: {
                    mode: 'tag_match',
                    conditions: {
                        sceneKeywords: document.getElementById('sceneKeywords').value.split(',').map(s => s.trim()).filter(Boolean),
                        emotions: document.getElementById('emotions').value.split(',').map(s => s.trim()).filter(Boolean),
                        actions: document.getElementById('actions').value.split(',').map(s => s.trim()).filter(Boolean)
                    },
                    priority: 800,
                    probability: 1.0
                },
                display: {
                    mode: 'character_center',
                    animation: { enter: 'zoom', duration: 500 },
                    zIndex: 10
                }
            };

            try {
                const res = await fetch(`${API_BASE()}/gallery/v2`, {
                    method: 'POST',
                    headers: getHeaders(),
                    body: JSON.stringify(data)
                });
                const result = await res.json();
                showResult('addResult', result);
            } catch (err) {
                showResult('addResult', { error: err.message }, true);
            }
        }

        async function testGetList() {
            try {
                const res = await fetch(`${API_BASE()}/gallery/v2?gameId=${GAME_ID()}`, {
                    headers: getHeaders()
                });
                const result = await res.json();
                showResult('listResult', result);
            } catch (err) {
                showResult('listResult', { error: err.message }, true);
            }
        }

        async function testMatch() {
            const data = {
                gameId: GAME_ID(),
                context: {
                    scene: document.getElementById('testScene').value,
                    emotion: '愤怒',
                    action: '拔剑'
                },
                options: { maxResults: 3 }
            };

            try {
                const res = await fetch(`${API_BASE()}/gallery/v2/match`, {
                    method: 'POST',
                    headers: getHeaders(),
                    body: JSON.stringify(data)
                });
                const result = await res.json();
                showResult('matchResult', result);
            } catch (err) {
                showResult('matchResult', { error: err.message }, true);
            }
        }

        async function testBatchMatch() {
            const scenes = [
                "雪地里，她拔出长剑，眼神中充满愤怒",
                "两人在温泉中放松，气氛暧昧",
                "星空下，他们相拥而吻",
                "战斗进入白热化，她身受重伤",
                "日常对话，没有特殊场景"
            ];

            const results = [];
            for (const scene of scenes) {
                try {
                    const res = await fetch(`${API_BASE()}/gallery/v2/match`, {
                        method: 'POST',
                        headers: getHeaders(),
                        body: JSON.stringify({
                            gameId: GAME_ID(),
                            context: { scene },
                            options: { maxResults: 1 }
                        })
                    });
                    const result = await res.json();
                    results.push({
                        scene: scene.substring(0, 30) + '...',
                        topMatch: result.data?.topMatch?.name || '无',
                        confidence: result.data?.confidence || 0,
                        suggestedSwitch: result.data?.suggestedSwitch || false
                    });
                } catch (err) {
                    results.push({ scene: scene.substring(0, 30), error: err.message });
                }
            }
            showResult('matchResult', results);
        }

        async function testTestMatch() {
            const scenes = document.getElementById('batchScenes').value.split('\n').filter(s => s.trim());
            
            try {
                const res = await fetch(`${API_BASE()}/gallery/v2/test-match`, {
                    method: 'POST',
                    headers: getHeaders(),
                    body: JSON.stringify({
                        gameId: GAME_ID(),
                        testScenes: scenes
                    })
                });
                const result = await res.json();
                showResult('testMatchResult', result);
            } catch (err) {
                showResult('testMatchResult', { error: err.message }, true);
            }
        }
    </script>
</body>
</html>
