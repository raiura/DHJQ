        // 导入数据到localStorage
        function importWorldbookData() {
            const statusElement = document.getElementById('status');
            
            try {
                // 导入数据
                Object.entries(worldbookData).forEach(([key, value]) => {
                    localStorage.setItem(key, JSON.stringify(value));
                    console.log(`导入数据到 localStorage 键: ${key}`);
                });
                
                // 显示成功消息
                statusElement.textContent = '世界书数据导入成功！请刷新设置页面查看世界书图书馆。';
                statusElement.className = 'status success';
                statusElement.style.display = 'block';
            } catch (error) {
                // 显示错误消息
                statusElement.textContent = `导入失败: ${error.message}`;
                statusElement.className = 'status error';
                statusElement.style.display = 'block';
                console.error('导入失败:', error);
