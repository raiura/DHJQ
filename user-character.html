<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的角色 - 角色预设管理</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #8a6d3b; --primary-dark: #6d5630; --primary-light: #b89b6c;
            --bg-dark: #1a1a2e; --bg-card: rgba(30, 30, 46, 0.95);
            --text-primary: #f5f2eb; --text-secondary: rgba(245, 242, 235, 0.7);
            --border: rgba(138, 109, 59, 0.3); --success: #4ecdc4;
            --warning: #feca57; --danger: #ff6b6b;
            --gradient-1: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
        }
        body {
            font-family: 'Microsoft YaHei', 'SimSun', sans-serif;
            background: linear-gradient(135deg, var(--bg-dark) 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh; color: var(--text-primary);
        }
        .bg-animation {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 0; overflow: hidden;
        }
        .bg-animation::before {
            content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: radial-gradient(circle at 20% 80%, rgba(138, 109, 59, 0.1) 0%, transparent 50%),
                        radial-gradient(circle at 80% 20%, rgba(78, 205, 196, 0.1) 0%, transparent 50%);
            animation: bgFloat 20s ease-in-out infinite;
        }
        @keyframes bgFloat { 0%, 100% { transform: translate(0, 0) rotate(0deg); } 50% { transform: translate(30px, -30px) rotate(180deg); } }
        .container { position: relative; z-index: 1; max-width: 1400px; margin: 0 auto; padding: 30px 20px; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .header-left { display: flex; align-items: center; gap: 20px; }
        .back-btn { padding: 10px 20px; background: rgba(138, 109, 59, 0.2); border: 1px solid var(--border); border-radius: 8px; color: var(--text-primary); text-decoration: none; font-size: 14px; }
        .header-title { font-size: 28px; font-weight: bold; background: linear-gradient(135deg, var(--primary-light), var(--primary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .btn { padding: 10px 24px; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.3s; display: inline-flex; align-items: center; gap: 8px; }
        .btn-primary { background: var(--gradient-1); color: white; }
        .btn-secondary { background: rgba(138, 109, 59, 0.2); color: var(--text-primary); border: 1px solid var(--border); }
        .btn-danger { background: rgba(255, 107, 107, 0.2); color: var(--danger); border: 1px solid rgba(255, 107, 107, 0.3); }
        .btn-sm { padding: 6px 12px; font-size: 12px; }
        .main-content { display: grid; grid-template-columns: 380px 1fr; gap: 25px; min-height: calc(100vh - 140px); }
        .character-list-panel { background: var(--bg-card); border: 1px solid var(--border); border-radius: 16px; padding: 20px; height: fit-content; }
        .panel-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; padding-bottom: 15px; border-bottom: 1px solid var(--border); }
        .panel-title { font-size: 18px; font-weight: 600; }
        .panel-subtitle { font-size: 13px; color: var(--text-secondary); margin-top: 4px; }
        .character-count { background: var(--gradient-1); color: white; padding: 4px 10px; border-radius: 12px; font-size: 12px; font-weight: 600; }
        .character-list { display: flex; flex-direction: column; gap: 12px; }
        .character-item { display: flex; align-items: center; gap: 12px; padding: 12px; background: rgba(0, 0, 0, 0.2); border: 2px solid transparent; border-radius: 12px; cursor: pointer; transition: all 0.3s; }
        .character-item:hover { background: rgba(138, 109, 59, 0.1); border-color: var(--border); }
        .character-item.active { background: rgba(138, 109, 59, 0.15); border-color: var(--primary); }
        .character-item-avatar { width: 48px; height: 48px; border-radius: 50%; background: var(--gradient-1); display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; overflow: hidden; }
        .character-item-avatar img { width: 100%; height: 100%; object-fit: cover; }
        .character-item-info { flex: 1; min-width: 0; }
        .character-item-name { font-weight: 600; font-size: 15px; margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .character-item-title { font-size: 12px; color: var(--text-secondary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .character-item-badge { padding: 2px 8px; border-radius: 10px; font-size: 10px; font-weight: 600; flex-shrink: 0; }
        .badge-active { background: rgba(78, 205, 196, 0.2); color: var(--success); }
        .empty-state { text-align: center; padding: 40px 20px; color: var(--text-secondary); }
        .empty-icon { font-size: 48px; margin-bottom: 12px; }
        .character-detail-panel { background: var(--bg-card); border: 1px solid var(--border); border-radius: 16px; padding: 25px; }
        .detail-header { display: flex; gap: 20px; margin-bottom: 25px; padding-bottom: 20px; border-bottom: 1px solid var(--border); }
        .detail-avatar { width: 100px; height: 100px; border-radius: 50%; background: var(--gradient-1); display: flex; align-items: center; justify-content: center; font-size: 40px; border: 4px solid var(--border); overflow: hidden; flex-shrink: 0; }
        .detail-avatar img { width: 100%; height: 100%; object-fit: cover; }
        .detail-header-info { flex: 1; }
        .detail-name { font-size: 24px; font-weight: 600; margin-bottom: 5px; }
        .detail-title { font-size: 14px; color: var(--text-secondary); margin-bottom: 12px; }
        .detail-tags { display: flex; flex-wrap: wrap; gap: 8px; }
        .detail-tag { padding: 4px 10px; background: rgba(138, 109, 59, 0.15); border-radius: 12px; font-size: 12px; color: var(--primary-light); }
        .detail-actions { display: flex; gap: 10px; }
        .detail-content { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; }
        .detail-section { background: rgba(0, 0, 0, 0.2); border-radius: 12px; padding: 15px; }
        .detail-section.full-width { grid-column: 1 / -1; }
        .detail-section-title { font-size: 13px; color: var(--primary-light); margin-bottom: 10px; font-weight: 600; }
        .detail-section-content { font-size: 14px; line-height: 1.6; color: var(--text-secondary); }
        .no-selection { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; min-height: 400px; text-align: center; color: var(--text-secondary); }
        .no-selection-icon { font-size: 64px; margin-bottom: 20px; }
        .no-selection-title { font-size: 20px; margin-bottom: 10px; color: var(--text-primary); }
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.8); z-index: 1000; justify-content: center; align-items: center; padding: 20px; }
        .modal-overlay.show { display: flex; }
        .modal { background: var(--bg-card); border: 1px solid var(--border); border-radius: 16px; width: 100%; max-width: 700px; max-height: 90vh; overflow-y: auto; }
        .modal-header { padding: 20px 25px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .modal-title { font-size: 18px; font-weight: 600; }
        .modal-close { background: none; border: none; color: var(--text-secondary); font-size: 24px; cursor: pointer; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; border-radius: 8px; }
        .modal-body { padding: 25px; }
        .modal-footer { padding: 15px 25px; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 10px; }
        .form-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
        .form-group { margin-bottom: 15px; }
        .form-group.full-width { grid-column: 1 / -1; }
        .form-label { display: block; font-size: 13px; color: var(--text-secondary); margin-bottom: 6px; }
        .form-input, .form-select, .form-textarea { width: 100%; padding: 10px 12px; background: rgba(0, 0, 0, 0.3); border: 1px solid var(--border); border-radius: 8px; color: var(--text-primary); font-size: 14px; }
        .form-textarea { resize: vertical; min-height: 80px; }
        .toast { position: fixed; bottom: 30px; right: 30px; padding: 12px 24px; background: rgba(20, 20, 35, 0.95); border: 1px solid var(--border); border-radius: 8px; color: white; font-size: 14px; z-index: 2000; display: none; }
        .toast.show { display: flex; }
        @media (max-width: 1024px) { .main-content { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="bg-animation"></div>
    <div class="container">
        <div class="header">
            <div class="header-left">
                <a href="index.html" class="back-btn">返回书店</a>
                <h1 class="header-title">我的角色预设</h1>
            </div>
            <button class="btn btn-primary" onclick="openCreateModal()">+ 创建新角色</button>
        </div>
        <div class="main-content">
            <div class="character-list-panel">
                <div class="panel-header">
                    <div><div class="panel-title">角色列表</div><div class="panel-subtitle">为不同世界创建专属角色</div></div>
                    <span class="character-count" id="characterCount">0</span>
                </div>
                <div class="character-list" id="characterList"></div>
            </div>
            <div class="character-detail-panel" id="detailPanel">
                <div class="no-selection" id="noSelection">
                    <div class="no-selection-icon">🎭</div>
                    <div class="no-selection-title">选择一个角色</div>
                    <p>从左侧列表选择角色查看详情，或创建新角色</p>
                </div>
                <div id="characterDetail" style="display: none;"></div>
            </div>
        </div>
    </div>

    <!-- 创建/编辑角色模态框 -->
    <div class="modal-overlay" id="characterModal">
        <div class="modal">
            <div class="modal-header">
                <h3 class="modal-title" id="modalTitle">创建新角色</h3>
                <button class="modal-close" onclick="closeModal()">&times;</button>
            </div>
            <div class="modal-body">
                <form id="characterForm" class="form-grid">
                    <input type="hidden" id="characterId">
                    <div class="form-group">
                        <label class="form-label">角色名称 *</label>
                        <input type="text" class="form-input" id="formName" placeholder="例如：陆芸儿" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">称号/职业</label>
                        <input type="text" class="form-input" id="formTitle" placeholder="例如：落星谷弟子">
                    </div>
                    <div class="form-group">
                        <label class="form-label">性别</label>
                        <select class="form-select" id="formGender">
                            <option value="">未设置</option>
                            <option value="male">男</option>
                            <option value="female">女</option>
                            <option value="other">其他</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label">年龄</label>
                        <input type="text" class="form-input" id="formAge" placeholder="例如：18岁">
                    </div>
                    <div class="form-group">
                        <label class="form-label">种族</label>
                        <input type="text" class="form-input" id="formRace" placeholder="例如：人族">
                    </div>
                    <div class="form-group">
                        <label class="form-label">出身地</label>
                        <input type="text" class="form-input" id="formOrigin" placeholder="例如：北寒落星丘">
                    </div>
                    <div class="form-group">
                        <label class="form-label">修为境界</label>
                        <input type="text" class="form-input" id="formCultivation" placeholder="例如：练气期">
                    </div>
                    <div class="form-group">
                        <label class="form-label">头像 URL</label>
                        <input type="text" class="form-input" id="formAvatar" placeholder="图片链接">
                    </div>
                    <div class="form-group">
                        <label class="form-label">代表色</label>
                        <input type="color" class="form-input" id="formColor" value="#4CAF50">
                    </div>
                    <div class="form-group full-width">
                        <label class="form-label">外貌特征</label>
                        <textarea class="form-textarea" id="formAppearance" placeholder="描述角色的外貌特征..."></textarea>
                    </div>
                    <div class="form-group full-width">
                        <label class="form-label">性格特点</label>
                        <textarea class="form-textarea" id="formPersonality" placeholder="描述角色的性格..."></textarea>
                    </div>
                    <div class="form-group full-width">
                        <label class="form-label">背景故事</label>
                        <textarea class="form-textarea" id="formBackground" placeholder="描述角色的身世和经历..."></textarea>
                    </div>
                    <div class="form-group full-width">
                        <label class="form-label">角色目标</label>
                        <textarea class="form-textarea" id="formGoal" placeholder="角色的愿望和追求..."></textarea>
                    </div>
                    <div class="form-group full-width">
                        <label class="form-label">特殊能力</label>
                        <textarea class="form-textarea" id="formAbilities" placeholder="角色的技能、法术、特殊能力..."></textarea>
                    </div>
                    <div class="form-group full-width">
                        <label class="form-label">心爱物品</label>
                        <textarea class="form-textarea" id="formItems" placeholder="角色携带的重要物品..."></textarea>
                    </div>
                    <div class="form-group full-width">
                        <label class="form-label">完整Prompt（用于AI）</label>
                        <textarea class="form-textarea" id="formPrompt" rows="4" placeholder="可以直接编辑，或由上方内容自动生成..."></textarea>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" onclick="closeModal()">取消</button>
                <button type="button" class="btn btn-primary" onclick="saveCharacter()">保存角色</button>
            </div>
        </div>
    </div>
    <div class="toast" id="toast"></div>

    <script>
        const API_BASE = 'http://localhost:3000/api';
        let characters = [];
        let selectedCharacterId = null;

        document.addEventListener('DOMContentLoaded', () => {
            checkAuth();
            loadCharacters();
        });

        function checkAuth() {
            const token = localStorage.getItem('galgame_token');
            if (!token) window.location.href = 'login.html?redirect=user-character.html';
        }

        function getAuthHeaders() {
            return {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${localStorage.getItem('galgame_token')}`
            };
        }

        async function loadCharacters() {
            try {
                const response = await fetch(`${API_BASE}/user-characters`, { headers: getAuthHeaders() });
                const data = await response.json();
                if (data.success) {
                    characters = data.data || [];
                    renderCharacterList();
                } else showToast(data.message || '加载失败', 'error');
            } catch (error) {
                showToast('网络错误', 'error');
            }
        }

        function renderCharacterList() {
            const container = document.getElementById('characterList');
            document.getElementById('characterCount').textContent = characters.length;

            if (characters.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">🎭</div>
                        <div style="margin-bottom: 15px;">还没有创建角色</div>
                        <button class="btn btn-primary" onclick="openCreateModal()">创建第一个角色</button>
                    </div>`;
                return;
            }

            container.innerHTML = characters.map(char => `
                <div class="character-item ${char._id === selectedCharacterId ? 'active' : ''}" onclick="selectCharacter('${char._id}')">
                    <div class="character-item-avatar" style="background: ${char.color || 'var(--gradient-1)'}">
                        ${char.avatar ? `<img src="${char.avatar}" alt="${char.name}">` : char.name.charAt(0)}
                    </div>
                    <div class="character-item-info">
                        <div class="character-item-name">${char.name}</div>
                        <div class="character-item-title">${char.title || char.origin || '无称号'}</div>
                    </div>
                    ${char.isActive ? '<span class="character-item-badge badge-active">当前</span>' : ''}
                </div>
            `).join('');
        }

        function selectCharacter(id) {
            selectedCharacterId = id;
            renderCharacterList();
            renderCharacterDetail();
        }

        function renderCharacterDetail() {
            const noSelection = document.getElementById('noSelection');
            const detail = document.getElementById('characterDetail');
            
            if (!selectedCharacterId) {
                noSelection.style.display = 'flex';
                detail.style.display = 'none';
                return;
            }

            const char = characters.find(c => c._id === selectedCharacterId);
            if (!char) return;

            noSelection.style.display = 'none';
            detail.style.display = 'block';

            const genderMap = { male: '男', female: '女', other: '其他' };
            const tags = [];
            if (char.gender) tags.push(`<span class="detail-tag">${genderMap[char.gender] || char.gender}</span>`);
            if (char.age) tags.push(`<span class="detail-tag">${char.age}</span>`);
            if (char.race) tags.push(`<span class="detail-tag">${char.race}</span>`);
            if (char.origin) tags.push(`<span class="detail-tag">${char.origin}</span>`);
            if (char.cultivation) tags.push(`<span class="detail-tag">${char.cultivation}</span>`);

            detail.innerHTML = `
                <div class="detail-header">
                    <div class="detail-avatar" style="background: ${char.color || 'var(--gradient-1)'}">
                        ${char.avatar ? `<img src="${char.avatar}" alt="${char.name}">` : char.name.charAt(0)}
                    </div>
                    <div class="detail-header-info">
                        <div class="detail-name">${char.name}</div>
                        <div class="detail-title">${char.title || ''}</div>
                        <div class="detail-tags">${tags.join('')}</div>
                    </div>
                    <div class="detail-actions">
                        <button class="btn btn-secondary btn-sm" onclick="openEditModal('${char._id}')">编辑</button>
                        <button class="btn btn-primary btn-sm" onclick="activateCharacter('${char._id}')">${char.isActive ? '已激活' : '设为当前'}</button>
                        <button class="btn btn-danger btn-sm" onclick="deleteCharacter('${char._id}')">删除</button>
                    </div>
                </div>
                <div class="detail-content">
                    ${char.appearance ? `<div class="detail-section"><div class="detail-section-title">👤 外貌特征</div><div class="detail-section-content">${char.appearance}</div></div>` : ''}
                    ${char.personality ? `<div class="detail-section"><div class="detail-section-title">🎭 性格特点</div><div class="detail-section-content">${char.personality}</div></div>` : ''}
                    ${char.background ? `<div class="detail-section full-width"><div class="detail-section-title">📜 背景故事</div><div class="detail-section-content">${char.background}</div></div>` : ''}
                    ${char.goal ? `<div class="detail-section"><div class="detail-section-title">🌟 角色目标</div><div class="detail-section-content">${char.goal}</div></div>` : ''}
                    ${char.abilities ? `<div class="detail-section"><div class="detail-section-title">✨ 特殊能力</div><div class="detail-section-content">${char.abilities}</div></div>` : ''}
                    ${char.items ? `<div class="detail-section full-width"><div class="detail-section-title">🎁 心爱物品</div><div class="detail-section-content">${char.items}</div></div>` : ''}
                    ${char.prompt ? `<div class="detail-section full-width"><div class="detail-section-title">📝 完整Prompt</div><div class="detail-section-content" style="font-family: monospace; background: rgba(0,0,0,0.3); padding: 15px; border-radius: 8px;">${char.prompt.replace(/\n/g, '<br>')}</div></div>` : ''}
                </div>`;
        }

        function openCreateModal() {
            document.getElementById('modalTitle').textContent = '创建新角色';
            document.getElementById('characterForm').reset();
            document.getElementById('characterId').value = '';
            document.getElementById('characterModal').classList.add('show');
        }

        function openEditModal(id) {
            const char = characters.find(c => c._id === id);
            if (!char) return;
            document.getElementById('modalTitle').textContent = '编辑角色';
            document.getElementById('characterId').value = char._id;
            document.getElementById('formName').value = char.name || '';
            document.getElementById('formTitle').value = char.title || '';
            document.getElementById('formGender').value = char.gender || '';
            document.getElementById('formAge').value = char.age || '';
            document.getElementById('formRace').value = char.race || '';
            document.getElementById('formOrigin').value = char.origin || '';
            document.getElementById('formCultivation').value = char.cultivation || '';
            document.getElementById('formAvatar').value = char.avatar || '';
            document.getElementById('formColor').value = char.color || '#4CAF50';
            document.getElementById('formAppearance').value = char.appearance || '';
            document.getElementById('formPersonality').value = char.personality || '';
            document.getElementById('formBackground').value = char.background || '';
            document.getElementById('formGoal').value = char.goal || '';
            document.getElementById('formAbilities').value = char.abilities || '';
            document.getElementById('formItems').value = char.items || '';
            document.getElementById('formPrompt').value = char.prompt || '';
            document.getElementById('characterModal').classList.add('show');
        }

        function closeModal() {
            document.getElementById('characterModal').classList.remove('show');
        }

        async function saveCharacter() {
            const id = document.getElementById('characterId').value;
            const data = {
                name: document.getElementById('formName').value.trim(),
                title: document.getElementById('formTitle').value.trim(),
                gender: document.getElementById('formGender').value,
                age: document.getElementById('formAge').value.trim(),
                race: document.getElementById('formRace').value.trim(),
                origin: document.getElementById('formOrigin').value.trim(),
                cultivation: document.getElementById('formCultivation').value.trim(),
                avatar: document.getElementById('formAvatar').value.trim(),
                color: document.getElementById('formColor').value,
                appearance: document.getElementById('formAppearance').value.trim(),
                personality: document.getElementById('formPersonality').value.trim(),
                background: document.getElementById('formBackground').value.trim(),
                goal: document.getElementById('formGoal').value.trim(),
                abilities: document.getElementById('formAbilities').value.trim(),
                items: document.getElementById('formItems').value.trim(),
                prompt: document.getElementById('formPrompt').value.trim()
            };

            if (!data.name) { showToast('请填写角色名称', 'error'); return; }

            try {
                const url = id ? `${API_BASE}/user-characters/${id}` : `${API_BASE}/user-characters`;
                const response = await fetch(url, { method: id ? 'PUT' : 'POST', headers: getAuthHeaders(), body: JSON.stringify(data) });
                const result = await response.json();
                if (result.success) {
                    showToast(id ? '角色已更新' : '角色已创建', 'success');
                    closeModal();
                    loadCharacters();
                } else showToast(result.message || '保存失败', 'error');
            } catch (error) { showToast('网络错误', 'error'); }
        }

        async function activateCharacter(id) {
            try {
                const response = await fetch(`${API_BASE}/user-characters/${id}/activate`, { method: 'POST', headers: getAuthHeaders() });
                const data = await response.json();
                if (data.success) { showToast('已设为当前角色', 'success'); loadCharacters(); }
                else showToast(data.message || '设置失败', 'error');
            } catch (error) { showToast('网络错误', 'error'); }
        }

        async function deleteCharacter(id) {
            if (!confirm('确定要删除这个角色吗？此操作不可恢复。')) return;
            try {
                const response = await fetch(`${API_BASE}/user-characters/${id}`, { method: 'DELETE', headers: getAuthHeaders() });
                const data = await response.json();
                if (data.success) {
                    showToast('角色已删除', 'success');
                    if (selectedCharacterId === id) { selectedCharacterId = null; renderCharacterDetail(); }
                    loadCharacters();
                } else showToast(data.message || '删除失败', 'error');
            } catch (error) { showToast('网络错误', 'error'); }
        }

        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = `toast show ${type}`;
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        document.getElementById('characterModal').addEventListener('click', (e) => { if (e.target.id === 'characterModal') closeModal(); });
    </script>
</body>
</html>
